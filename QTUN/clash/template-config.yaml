mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: silent
ipv6: false
external-controller: 0.0.0.0:9090
global-client-fingerprint: chrome
external-ui: ./dashboard

tun:
  enable: true
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true

tproxy-port: 9898
redir-port: 9797

proxies: []

proxy-groups:
  - name: "AUTO"
    type: select
    proxies:
      - "DIRECT"
  - name: "Keep-Alive"
    type: url-test
    proxies: []
    url: http://www.gstatic.com/generate_204
    interval: 20
    tolerance: 500

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 223.5.5.5
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - https://dns.google/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - 9.9.9.9
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - DST-PORT,53,DIRECT
  - MATCH,AUTO